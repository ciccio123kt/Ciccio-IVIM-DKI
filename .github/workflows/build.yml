name: Build Ciccio IVIM DKI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Build Windows EXE with PyInstaller
        run: |
          pyinstaller --onefile --windowed ^
            --name "Ciccio_IVIM_DKI_v2.0_windows" ^
            --add-data ".:." ^
            --hidden-import=pydicom ^
            --hidden-import=numpy ^
            --hidden-import=scipy ^
            --hidden-import=sklearn ^
            --hidden-import=skimage ^
            --hidden-import=matplotlib ^
            --hidden-import=nibabel ^
            --hidden-import=pandas ^
            --hidden-import=reportlab ^
            --hidden-import=PIL ^
            --hidden-import=cv2 ^
            main.py
      
      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: Ciccio_IVIM_DKI_v2.0_windows
          path: dist/Ciccio_IVIM_DKI_v2.0_windows.exe

  build-macos:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Build macOS APP with PyInstaller
        run: |
          pyinstaller --onefile --windowed \
            --name "Ciccio_IVIM_DKI_v2.0" \
            --add-data ".:." \
            --hidden-import=pydicom \
            --hidden-import=numpy \
            --hidden-import=scipy \
            --hidden-import=sklearn \
            --hidden-import=skimage \
            --hidden-import=matplotlib \
            --hidden-import=nibabel \
            --hidden-import=pandas \
            --hidden-import=reportlab \
            --hidden-import=PIL \
            --hidden-import=cv2 \
            main.py
      
      - name: Create DMG
        run: |
          pip install dmgbuild
          dmgbuild -s dmg_settings.py "Ciccio IVIM DKI" dist/Ciccio_IVIM_DKI_v2.0.dmg
      
      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: Ciccio_IVIM_DKI_v2.0_macos
          path: dist/Ciccio_IVIM_DKI_v2.0.dmg

  create-release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: success()
    
    steps:
      - uses: actions/download-artifact@v4
      
      - name: Display structure
        run: find . -type f
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            Ciccio_IVIM_DKI_v2.0_windows/*
            Ciccio_IVIM_DKI_v2.0_macos/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
